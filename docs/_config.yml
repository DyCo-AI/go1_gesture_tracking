# Site settings
course_name: "MISSION CONTROL: Gesture-Guided Quadruped Navigation"
course_description: |
  This one-credit Creative Inquiry course introduces undergraduate students to
  human–robot teaming, computer vision, and safe high-level control of a
  quadruped robot. Students develop a hand-gesture interface using their laptop
  webcams, integrate it with the live camera feed from the laboratory's Unitree
  Go1, and guide the robot through a modular maze without direct visual contact.

